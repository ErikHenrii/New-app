# ── Configuração do Render (Infrastructure as Code) ──
# Documentação: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: missao-reviver
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: reviver-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@missaoreviver.com.br
      - key: ADMIN_SENHA
        value: Reviver@Admin2026
      - key: ADMIN_NOME
        value: Administrador

databases:
  - name: reviver-db
    databaseName: missao_reviver
    plan: free
    ipAllowList: []
