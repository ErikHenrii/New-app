<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar — Missão Reviver</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body data-page="login">

  <nav class="auth-navbar">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="#0a2a6e" stroke-width="2.5">
        <path d="M12 2v20M5 9h14" stroke-linecap="round"/>
      </svg>
    </div>
    <span>Missão Reviver</span>
  </nav>

  <div class="auth-container">
    <div class="auth-card">
      <h1>Bem-vindo de volta</h1>
      <p class="subtitle">Entre para acessar a área restrita da comunidade.</p>

      <div class="alert alert-error" id="loginAlert"></div>

      <div class="info-banner">
        <span>🔒</span>
        <span>Primeiro acesso? Use o admin padrão:<br><strong>admin@missaoreviver.com.br</strong> / <strong>Reviver@Admin2026</strong></span>
      </div>

      <form id="loginForm" autocomplete="on">
        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" autocomplete="email" placeholder="seu@email.com" required />
          <span class="form-error"></span>
        </div>

        <div class="form-group">
          <label for="senha">Senha</label>
          <input type="password" id="senha" name="senha" autocomplete="current-password" placeholder="••••••••" required />
          <span class="form-error"></span>
        </div>

        <button type="submit" class="btn btn-primary">Entrar</button>
      </form>

      <p class="auth-link">
        Ainda não tem conta? <a href="register.html">Cadastre-se</a>
      </p>
    </div>
  </div>

  <footer class="auth-footer">
    Comunidade Cristã Missão Reviver · Betim — MG<br>
    <a href="index.html" style="color:var(--gray-text);">← Voltar ao site</a>
  </footer>

  
  <script src="js/api.js"></script>
  <script src="js/auth-frontend.js"></script>
</body>
</html>
