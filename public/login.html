<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Missão Reviver</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-container">
      <a href="/" class="header-logo">⛪ Missão <span>Reviver</span></a>
      <div class="header-acoes" id="header-acoes"></div>
    </div>
  </header>

  <div class="container container-estreito" style="padding-top: 60px;">
    <h2 class="secao-titulo">Entrar</h2>
    <p class="secao-subtitulo">Acesse sua conta da comunidade</p>

    <div id="alerta-container"></div>

    <form id="form-login">
      <div class="form-grupo">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required placeholder="seu@email.com">
      </div>
      <div class="form-grupo">
        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" required placeholder="Sua senha">
      </div>
      <button type="submit" class="btn btn-primario" style="width: 100%;" id="btn-entrar">Entrar</button>
    </form>

    <p style="text-align: center; margin-top: 20px;">
      Não tem conta? <a href="/registro.html">Cadastre-se</a>
    </p>
  </div>

  <script src="/js/main.js"></script>
  <script>
    document.getElementById('form-login').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn-entrar');
      const container = document.getElementById('alerta-container');

      btn.disabled = true;
      btn.textContent = 'Entrando...';

      try {
        const email = document.getElementById('email').value;
        const senha = document.getElementById('senha').value;

        const resp = await apiFetch('/auth/login', {
          method: 'POST',
          body: JSON.stringify({ email, senha }),
        });

        setSessao(resp.token, resp.usuario);
        mostrarAlerta(container, 'Login realizado com sucesso!', 'sucesso');

        setTimeout(() => {
          if (resp.usuario.role === 'admin') {
            window.location.href = '/admin.html';
          } else {
            window.location.href = '/perfil.html';
          }
        }, 800);
      } catch (err) {
        mostrarAlerta(container, err.message, 'erro');
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    });
  </script>
</body>
</html>
